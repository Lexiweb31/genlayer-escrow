services:
  - type: web
    name: genlayer-escrow
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn dashboard.api:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: DEMO_CLIENT_PRIVATE_KEY
        sync: false
      - key: DEMO_WORKER_PRIVATE_KEY
        sync: false
      - key: PERSIST_DATA_DIR
        sync: false
