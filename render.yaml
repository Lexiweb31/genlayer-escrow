services:
  - type: web
    name: genlayer-escrow
    runtime: python
    plan: starter
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn dashboard.api:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    disk:
      name: merit-data
      mountPath: /var/data/merit
      sizeGB: 1
    envVars:
      - key: DEMO_CLIENT_PRIVATE_KEY
        sync: false
      - key: DEMO_WORKER_PRIVATE_KEY
        sync: false
      - key: PERSIST_DATA_DIR
        value: /var/data/merit
      - key: PLATFORM_FEE_ADDRESS
        sync: false
      - key: MARKETPLACE_RECONCILE_ENABLED
        value: "1"
      - key: MARKETPLACE_RECONCILE_SECONDS
        value: "30"
